name: Restore dhara_tool
description: Restore a versioned dhara_tool dist binary from Actions cache, building on cache miss

inputs:
  tool-version:
    description: Pinned dhara_tool version from dhara.config.toml
    required: true
  os-arch:
    description: Cache suffix for the runner OS/arch (e.g. windows-x64)
    required: true

runs:
  using: composite
  steps:
    - name: Restore dhara_tool cache
      id: tool-cache
      uses: actions/cache/restore@v4
      with:
        path: target/dist
        key: dhara-tool-${{ inputs.tool-version }}-${{ inputs.os-arch }}
        restore-keys: |
          dhara-tool-${{ inputs.tool-version }}-

    - name: Build dhara_tool on cache miss
      if: steps.tool-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        echo "Cache miss for dhara-tool-${{ inputs.tool-version }}-${{ inputs.os-arch }}; building profile.dist."
        cargo build -p dhara_tool --profile dist

    - name: Require dhara_tool binary
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ runner.os }}" = "Windows" ]; then
          bin="target/dist/dhara_tool.exe"
        else
          bin="target/dist/dhara_tool"
        fi
        if [ ! -f "$bin" ]; then
          echo "::error::dhara_tool v${{ inputs.tool-version }} (${{ inputs.os-arch }}) is missing after cache restore and dist build."
          exit 1
        fi
        chmod +x "$bin" 2>/dev/null || true
        built="$("$bin" --version)"
        if [ "$built" != "${{ inputs.tool-version }}" ]; then
          echo "::error::dist reports v${built}, expected v${{ inputs.tool-version }}"
          exit 1
        fi
        echo "Using dhara_tool v${built} (${{ inputs.os-arch }})."
