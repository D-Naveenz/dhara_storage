# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Setup Linux tool build dependencies
description: System packages required to compile dhara_tool (iced/winit) on Ubuntu runners

runs:
  using: composite
  steps:
    - name: Install GUI and pkg-config dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libglib2.0-dev \
          libgtk-3-dev \
          libwayland-dev \
          libxkbcommon-dev
