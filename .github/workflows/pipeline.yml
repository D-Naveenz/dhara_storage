name: Pipeline

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_HOME: ${{ github.workspace }}/.dotnet

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: code quality (linux)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Linux tool dependencies
        uses: ./.github/actions/setup-linux-tool-deps

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-x64

      - name: Quality checks
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality fmt --check
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality clippy
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality doc

  platform-windows:
    name: platform (windows)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: windows-x64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool.exe
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality test-rust
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality test-dotnet
          "$tool" -r "$GITHUB_WORKSPACE" --yes package stage-native --msvc-env

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-windows
          path: target/dist/artifacts/native-stage

  platform-linux:
    name: platform (linux)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-x64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality test-rust
          "$tool" -r "$GITHUB_WORKSPACE" --yes package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-linux
          path: target/dist/artifacts/native-stage

  platform-linux-arm64:
    name: platform (linux arm64)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-arm64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality test-rust
          "$tool" -r "$GITHUB_WORKSPACE" --yes package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-linux-arm64
          path: target/dist/artifacts/native-stage

  platform-macos:
    name: platform (macos)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: osx-arm64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" -r "$GITHUB_WORKSPACE" --yes quality test-rust
          "$tool" -r "$GITHUB_WORKSPACE" --yes package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-macos
          path: target/dist/artifacts/native-stage

  publish-readiness:
    name: NuGet publish readiness (linux)
    if: github.event_name == 'pull_request'
    needs: [platform-windows, platform-linux, platform-linux-arm64, platform-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-x64

      - name: Download native stages
        uses: actions/download-artifact@v4
        with:
          pattern: native-stage-*
          path: target/dist/artifacts/native-inputs
          merge-multiple: false

      - name: Merge native stages
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" -r "$GITHUB_WORKSPACE" --yes native merge \
            --output target/dist/artifacts/native-stage \
            --input target/dist/artifacts/native-inputs/native-stage-windows \
            --input target/dist/artifacts/native-inputs/native-stage-linux \
            --input target/dist/artifacts/native-inputs/native-stage-linux-arm64 \
            --input target/dist/artifacts/native-inputs/native-stage-macos

      - name: Verify package
        shell: bash
        run: |
          set -euo pipefail
          target/dist/dhara_tool -r "$GITHUB_WORKSPACE" --yes verify package

      - name: Write release metadata
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -E '^\s*workspace\s*=' dhara.config.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          printf '{"version":"%s","commit":"%s"}\n' "$version" "${{ github.sha }}" > target/dist/artifacts/release-metadata.json

      - name: Upload release native stage
        uses: actions/upload-artifact@v4
        with:
          name: release-native-stage
          path: target/dist/artifacts/native-stage
          retention-days: 90

      - name: Upload release NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-package
          path: |
            target/dist/output/nuget/*.nupkg
            target/dist/output/nuget/*.snupkg
            target/dist/output/nuget/*.symbols.nupkg
          retention-days: 90

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: target/dist/artifacts/release-metadata.json
          retention-days: 90
