name: Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate release flow without publishing
        required: true
        default: false
        type: boolean
      publish_cargo:
        description: Publish dhara_storage_dal and dhara_storage before NuGet
        required: true
        default: true
        type: boolean
      publish_nuget:
        description: Publish the Dhara.Storage NuGet package after Cargo release
        required: true
        default: true
        type: boolean
      verify_package:
        description: Re-run full verify package on dry-run when using pre-packed artifacts
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_HOME: ${{ github.workspace }}\.dotnet

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: code quality (windows)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -p dhara_storage_dal -p dhara_storage -p dharastorage -p dhara_tool --check

      - name: Clippy (dhara_storage)
        run: cargo clippy -p dhara_storage --all-targets --all-features -- -D warnings

      - name: Clippy (other crates)
        run: cargo clippy -p dhara_storage_dal -p dharastorage -p dhara_tool --all-targets -- -D warnings

      - name: Rustdoc
        run: |
          cargo doc -p dhara_storage --no-deps --all-features
          cargo doc -p dhara_storage_dal -p dharastorage -p dhara_tool --no-deps

  platform-windows:
    name: platform (windows)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust tests
        run: |
          cargo test -p dhara_storage --all-features
          cargo test -p dhara_storage_dal
          cargo test -p dharastorage

      - name: .NET tests
        run: dotnet test src/bindings/Dhara.Storage.Tests/Dhara.Storage.Tests.csproj

      - name: Build dhara_tool (ci profile)
        run: cargo build -p dhara_tool --profile ci

      - name: Stage native assets
        shell: pwsh
        run: ./tooling/scripts/stage-native-windows.ps1 -ToolPath target/ci/dhara_tool.exe

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-windows
          path: tooling/artifacts/native-stage

  platform-linux:
    name: platform (linux)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev gcc-aarch64-linux-gnu

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust tests
        run: |
          cargo test -p dhara_storage --all-features
          cargo test -p dhara_storage_dal
          cargo test -p dharastorage

      - name: Build dhara_tool (ci profile)
        run: cargo build -p dhara_tool --profile ci

      - name: Stage native assets
        run: ./target/ci/dhara_tool package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-linux
          path: tooling/artifacts/native-stage

  platform-macos:
    name: platform (macos)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust tests
        run: |
          cargo test -p dhara_storage --all-features
          cargo test -p dhara_storage_dal
          cargo test -p dharastorage

      - name: Build dhara_tool (ci profile)
        run: cargo build -p dhara_tool --profile ci

      - name: Stage native assets
        run: ./target/ci/dhara_tool package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-macos
          path: tooling/artifacts/native-stage

  publish-readiness:
    name: NuGet publish readiness (windows)
    if: github.event_name == 'pull_request'
    needs: [platform-windows, platform-linux, platform-macos]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download native stages
        uses: actions/download-artifact@v4
        with:
          pattern: native-stage-*
          path: tooling/artifacts/native-inputs
          merge-multiple: false

      - name: Merge native stages
        shell: pwsh
        run: >
          ./tooling/scripts/merge-native.ps1
          -Output tooling/artifacts/native-stage
          -Input
          tooling/artifacts/native-inputs/native-stage-windows
          tooling/artifacts/native-inputs/native-stage-linux
          tooling/artifacts/native-inputs/native-stage-macos

      - name: Build dhara_tool (ci profile)
        run: cargo build -p dhara_tool --profile ci

      - name: Verify package
        run: >
          ./target/ci/dhara_tool.exe verify package
          --configuration Release
          --native-stage tooling/artifacts/native-stage

      - name: Write release metadata
        shell: pwsh
        run: |
          $version = (Select-String -Path dhara.config.toml -Pattern '^\s*workspace\s*=\s*"(.+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value })
          @{ version = $version; commit = "${{ github.sha }}" } | ConvertTo-Json | Set-Content tooling/artifacts/release-metadata.json

      - name: Upload release native stage
        uses: actions/upload-artifact@v4
        with:
          name: release-native-stage
          path: tooling/artifacts/native-stage
          retention-days: 90

      - name: Upload release NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-package
          path: |
            tooling/output/nuget/*.nupkg
            tooling/output/nuget/*.snupkg
            tooling/output/nuget/*.symbols.nupkg
          retention-days: 90

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: tooling/artifacts/release-metadata.json
          retention-days: 90

  push-changes:
    name: detect main push changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  publish:
    name: release (windows)
    needs: [push-changes]
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.push-changes.outputs.code == 'true')
      )
    runs-on: windows-latest
    environment: nuget-production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        run: cargo install cargo-release --version 1.1.2 --locked

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download PR CI native stage
        id: native-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pipeline.yml
          commit: ${{ github.sha }}
          workflow_conclusion: success
          name: release-native-stage
          path: tooling/artifacts/native-stage

      - name: Download NuGet package artifact
        id: nupkg-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pipeline.yml
          commit: ${{ github.sha }}
          workflow_conclusion: success
          name: release-nuget-package
          path: tooling/output/nuget

      - name: Require PR CI artifacts
        shell: pwsh
        run: |
          $hasNative = Test-Path tooling/artifacts/native-stage/runtimes
          $nupkg = Get-ChildItem -Path tooling/output/nuget -Filter *.nupkg -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($hasNative -and $nupkg) {
            exit 0
          }
          Write-Error "No PR CI artifacts found for commit ${{ github.sha }}. Merge with a merge commit so PR CI artifacts match, or run publish-readiness on main."

      - name: Resolve pre-packed NuGet path
        id: nupkg
        shell: pwsh
        run: |
          $package = Get-ChildItem -Path tooling/output/nuget -Filter *.nupkg | Select-Object -First 1
          if (-not $package) {
            Write-Error "NuGet package artifact was not downloaded."
          }
          "path=$($package.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build dhara_tool (ci profile)
        run: cargo build -p dhara_tool --profile ci

      - name: Publish DAL, runtime, and NuGet
        shell: pwsh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $toolArgs = @(
            "release", "run",
            "--native-stage", "tooling/artifacts/native-stage",
            "--prepacked-nuget", "${{ steps.nupkg.outputs.path }}"
          )

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.dry_run }}" -eq "true") { $toolArgs += "--dry-run" }
            if ("${{ inputs.publish_cargo }}" -ne "true") { $toolArgs += "--skip-cargo" }
            if ("${{ inputs.publish_nuget }}" -ne "true") { $toolArgs += "--skip-nuget" }
            if ("${{ inputs.verify_package }}" -eq "true") { $toolArgs += "--verify-package" }
          }

          $vsInstall = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            throw "Visual Studio with x64 and ARM64 MSVC build tools was not found."
          }
          $vcvars = Join-Path $vsInstall "VC\Auxiliary\Build\vcvarsall.bat"
          $command = "call `"$vcvars`" x64_arm64 && target\ci\dhara_tool.exe " + ($toolArgs -join " ")
          & cmd.exe /d /c $command
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload NuGet artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dhara.Storage-package
          path: |
            tooling/output/nuget/*.nupkg
            tooling/output/nuget/*.snupkg
            tooling/output/nuget/*.symbols.nupkg
