name: Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate release flow without publishing
        required: true
        default: false
        type: boolean
      publish_cargo:
        description: Publish dhara_storage_dal and dhara_storage before NuGet
        required: true
        default: true
        type: boolean
      publish_nuget:
        description: Publish the Dhara.Storage NuGet package after Cargo release
        required: true
        default: true
        type: boolean
      verify_package:
        description: Re-run full verify package on dry-run when using pre-packed artifacts
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_HOME: ${{ github.workspace }}/.dotnet

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: code quality (linux)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-x64

      - name: Quality checks
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" quality fmt --check
          "$tool" quality clippy
          "$tool" quality doc

  platform-windows:
    name: platform (windows)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: windows-x64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool.exe
          "$tool" quality test-rust
          "$tool" quality test-dotnet
          "$tool" package stage-native --msvc-env

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-windows
          path: target/dist/artifacts/native-stage

  platform-linux:
    name: platform (linux)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-x64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" quality test-rust
          "$tool" package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-linux
          path: target/dist/artifacts/native-stage

  platform-linux-arm64:
    name: platform (linux arm64)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-arm64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" quality test-rust
          "$tool" package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-linux-arm64
          path: target/dist/artifacts/native-stage

  platform-macos:
    name: platform (macos)
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: osx-arm64

      - name: Platform tests and native staging
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" quality test-rust
          "$tool" package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-macos
          path: target/dist/artifacts/native-stage

  publish-readiness:
    name: NuGet publish readiness (linux)
    if: github.event_name == 'pull_request'
    needs: [platform-windows, platform-linux, platform-linux-arm64, platform-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-x64

      - name: Download native stages
        uses: actions/download-artifact@v4
        with:
          pattern: native-stage-*
          path: target/dist/artifacts/native-inputs
          merge-multiple: false

      - name: Merge native stages
        shell: bash
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          "$tool" native merge \
            --output target/dist/artifacts/native-stage \
            --input target/dist/artifacts/native-inputs/native-stage-windows \
            --input target/dist/artifacts/native-inputs/native-stage-linux \
            --input target/dist/artifacts/native-inputs/native-stage-linux-arm64 \
            --input target/dist/artifacts/native-inputs/native-stage-macos

      - name: Verify package
        shell: bash
        run: |
          set -euo pipefail
          target/dist/dhara_tool verify package

      - name: Write release metadata
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -E '^\s*workspace\s*=' dhara.config.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          printf '{"version":"%s","commit":"%s"}\n' "$version" "${{ github.sha }}" > target/dist/artifacts/release-metadata.json

      - name: Upload release native stage
        uses: actions/upload-artifact@v4
        with:
          name: release-native-stage
          path: target/dist/artifacts/native-stage
          retention-days: 90

      - name: Upload release NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-package
          path: |
            target/dist/output/nuget/*.nupkg
            target/dist/output/nuget/*.snupkg
            target/dist/output/nuget/*.symbols.nupkg
          retention-days: 90

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: target/dist/artifacts/release-metadata.json
          retention-days: 90

  push-changes:
    name: detect main push changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  publish:
    name: release (linux)
    needs: [push-changes]
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.push-changes.outputs.code == 'true')
      )
    runs-on: ubuntu-latest
    environment: nuget-production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        run: cargo install cargo-release --version 1.1.2 --locked

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read pinned tool version
        id: tool
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -A2 '^\[tool\]' dhara.config.toml | grep -E '^\s*version\s*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          tool-version: ${{ steps.tool.outputs.version }}
          os-arch: linux-x64

      - name: Resolve PR CI artifact commit
        id: artifact-commit
        shell: bash
        run: |
          set -euo pipefail
          merge_sha="${{ github.sha }}"
          artifact_sha=""
          if git rev-parse --verify "${merge_sha}^2" >/dev/null 2>&1; then
            artifact_sha="$(git rev-parse "${merge_sha}^2")"
            echo "Using merge second parent ${artifact_sha} for PR CI artifacts."
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            before="${{ github.event.before }}"
            if git rev-parse --verify "${before}^2" >/dev/null 2>&1; then
              artifact_sha="$(git rev-parse "${before}^2")"
              echo "Using second parent ${artifact_sha} of previous main tip ${before} for PR CI artifacts."
            fi
          fi
          if [ -z "${artifact_sha}" ]; then
            artifact_sha="${merge_sha}"
            echo "Using push commit ${artifact_sha} for artifacts."
          fi
          echo "sha=${artifact_sha}" >> "${GITHUB_OUTPUT}"

      - name: Download PR CI native stage
        id: native-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pipeline.yml
          commit: ${{ steps.artifact-commit.outputs.sha }}
          workflow_conclusion: success
          name: release-native-stage
          path: target/dist/artifacts/native-stage

      - name: Download NuGet package artifact
        id: nupkg-artifact
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pipeline.yml
          commit: ${{ steps.artifact-commit.outputs.sha }}
          workflow_conclusion: success
          name: release-nuget-package
          path: target/dist/output/nuget

      - name: Require PR CI artifacts
        shell: bash
        run: |
          set -euo pipefail
          if [ -d target/dist/artifacts/native-stage/runtimes ] && compgen -G "target/dist/output/nuget/*.nupkg" > /dev/null; then
            exit 0
          fi
          echo "::error::No PR CI artifacts found for commit ${{ steps.artifact-commit.outputs.sha }} (merge ${{ github.sha }}). Ensure publish-readiness succeeded on the merged PR branch tip before release. Squash merges are not supported for pre-packed CD."
          exit 1

      - name: Resolve pre-packed NuGet path
        id: nupkg
        shell: bash
        run: |
          set -euo pipefail
          package=$(find target/dist/output/nuget -maxdepth 1 -name '*.nupkg' -print -quit)
          if [ -z "$package" ]; then
            echo "::error::NuGet package artifact was not downloaded."
            exit 1
          fi
          echo "path=${package}" >> "${GITHUB_OUTPUT}"

      - name: Publish DAL, runtime, and NuGet
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          args=(release run --prepacked-nuget "${{ steps.nupkg.outputs.path }}")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then args+=(--dry-run); fi
            if [ "${{ inputs.publish_cargo }}" != "true" ]; then args+=(--skip-cargo); fi
            if [ "${{ inputs.publish_nuget }}" != "true" ]; then args+=(--skip-nuget); fi
            if [ "${{ inputs.verify_package }}" = "true" ]; then args+=(--verify-package); fi
          fi
          "$tool" "${args[@]}"

      - name: Upload NuGet artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Dhara.Storage-package
          path: |
            target/dist/output/nuget/*.nupkg
            target/dist/output/nuget/*.snupkg
            target/dist/output/nuget/*.symbols.nupkg
