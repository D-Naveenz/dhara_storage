name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_HOME: ${{ github.workspace }}\.dotnet

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  integrity-windows:
    name: project integrity (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify CI
        run: cargo run -p dhara_tool -- verify ci

  integrity-linux:
    name: project integrity (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify CI
        run: cargo run -p dhara_tool -- verify ci

  integrity-macos:
    name: project integrity (macos)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify CI
        run: cargo run -p dhara_tool -- verify ci

  native-windows:
    name: native assets (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Add Rust targets
        run: rustup target add aarch64-pc-windows-msvc

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Stage Windows native assets
        shell: pwsh
        run: |
          $vsInstall = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            throw "Visual Studio with x64 and ARM64 MSVC build tools was not found."
          }
          $vcvars = Join-Path $vsInstall "VC\Auxiliary\Build\vcvarsall.bat"
          $command = "call `"$vcvars`" x64_arm64 && cargo run -p dhara_tool -- package stage-native"
          & cmd.exe /d /c $command
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-windows
          path: tooling/artifacts/native-stage

  native-linux:
    name: native assets (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev gcc-aarch64-linux-gnu

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Stage Linux native assets
        run: cargo run -p dhara_tool -- package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-linux
          path: tooling/artifacts/native-stage

  native-macos:
    name: native assets (macos)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Stage macOS native assets
        run: cargo run -p dhara_tool -- package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-macos
          path: tooling/artifacts/native-stage

  publish-readiness:
    name: NuGet publish readiness (windows)
    runs-on: windows-latest
    needs: [native-windows, native-linux, native-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download native stages
        uses: actions/download-artifact@v4
        with:
          pattern: native-stage-*
          path: tooling/artifacts/native-inputs
          merge-multiple: false

      - name: Merge native stages
        run: >
          cargo run -p dhara_tool -- package merge-native
          --output tooling/artifacts/native-stage
          --input tooling/artifacts/native-inputs/native-stage-windows
          --input tooling/artifacts/native-inputs/native-stage-linux
          --input tooling/artifacts/native-inputs/native-stage-macos

      - name: Verify publish readiness
        shell: pwsh
        run: |
          cargo run -p dhara_tool -- verify release-config
          cargo run -p dhara_tool -- verify docs
          cargo run -p dhara_tool -- verify package --configuration Release --native-stage tooling/artifacts/native-stage
