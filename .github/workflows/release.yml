name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate release flow without publishing
        required: true
        default: false
        type: boolean
      publish_cargo:
        description: Publish dhara_storage_dal and dhara_storage before NuGet
        required: true
        default: true
        type: boolean
      publish_nuget:
        description: Publish the Dhara.Storage NuGet package after Cargo release
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_HOME: ${{ github.workspace }}\.dotnet

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native-windows:
    name: native assets (windows)
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Add Rust targets
        run: rustup target add aarch64-pc-windows-msvc

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Stage Windows native assets
        shell: pwsh
        run: |
          $vsInstall = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            throw "Visual Studio with x64 and ARM64 MSVC build tools was not found."
          }
          $vcvars = Join-Path $vsInstall "VC\Auxiliary\Build\vcvarsall.bat"
          $command = "call `"$vcvars`" x64_arm64 && cargo run -p dhara_tool -- package stage-native"
          & cmd.exe /d /c $command
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-windows
          path: tooling/artifacts/native-stage

  native-linux:
    name: native assets (linux)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev gcc-aarch64-linux-gnu

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Stage Linux native assets
        run: cargo run -p dhara_tool -- package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-linux
          path: tooling/artifacts/native-stage

  native-macos:
    name: native assets (macos)
    runs-on: macos-14
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Stage macOS native assets
        run: cargo run -p dhara_tool -- package stage-native

      - name: Upload native stage
        uses: actions/upload-artifact@v4
        with:
          name: native-stage-macos
          path: tooling/artifacts/native-stage

  release:
    name: release (windows)
    runs-on: windows-latest
    needs: [native-windows, native-linux, native-macos]
    if: github.ref == 'refs/heads/main'
    environment: nuget-production

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        run: cargo install cargo-release --version 1.1.2 --locked

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download native stages
        uses: actions/download-artifact@v4
        with:
          pattern: native-stage-*
          path: tooling/artifacts/native-inputs
          merge-multiple: false

      - name: Merge native stages
        run: >
          cargo run -p dhara_tool -- package merge-native
          --output tooling/artifacts/native-stage
          --input tooling/artifacts/native-inputs/native-stage-windows
          --input tooling/artifacts/native-inputs/native-stage-linux
          --input tooling/artifacts/native-inputs/native-stage-macos

      - name: Publish DAL, runtime, and NuGet
        shell: pwsh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $vsInstall = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsInstall)) {
            throw "Visual Studio with x64 and ARM64 MSVC build tools was not found."
          }

          $vcvars = Join-Path $vsInstall "VC\Auxiliary\Build\vcvarsall.bat"
          $arguments = @(
            "run", "-p", "dhara_tool", "--", "release", "run",
            "--native-stage", "tooling/artifacts/native-stage"
          )

          if ("${{ inputs.dry_run }}" -eq "true") {
            $arguments += "--dry-run"
          }

          if ("${{ inputs.publish_cargo }}" -ne "true") {
            $arguments += "--skip-cargo"
          }

          if ("${{ inputs.publish_nuget }}" -ne "true") {
            $arguments += "--skip-nuget"
          }

          $command = "call `"$vcvars`" x64_arm64 && cargo " + ($arguments -join " ")
          & cmd.exe /d /c $command
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload NuGet artifacts
        if: ${{ always() && inputs.publish_nuget }}
        uses: actions/upload-artifact@v7
        with:
          name: Dhara.Storage-package
          path: |
            tooling/output/nuget/*.nupkg
            tooling/output/nuget/*.snupkg
            tooling/output/nuget/*.symbols.nupkg
