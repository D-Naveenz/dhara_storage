name: publish-crates

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate cargo release without publishing
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: detect cargo scope
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            cargo_scope:
              - 'src/core/dhara_storage/**'
              - 'src/core/dhara_storage_dal/**'
              - 'dhara.config.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/publish-crates.yml'
      - name: Resolve scope
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=${{ steps.filter.outputs.cargo_scope }}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: cargo release (linux)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        run: cargo install cargo-release --version 1.1.2 --locked

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Restore dhara_tool
        uses: ./.github/actions/restore-dhara-tool
        with:
          os-arch: linux-x64

      - name: Publish crates
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          tool=target/dist/dhara_tool
          args=(release run --skip-nuget)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          "$tool" -r "$GITHUB_WORKSPACE" --yes "${args[@]}"
