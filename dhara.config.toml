[versions]
workspace = "0.9.0"

[tool]
version = "0.8.10"

[nuget]
package_id = "Dhara.Storage"
source = "https://api.nuget.org/v3/index.json"
authors = ["Naveen Dharmathunga"]
description = "High-level .NET bindings for the native Dhara Storage Rust runtime."
tags = [
    "storage",
    "ffi",
    "rust",
    "analysis",
    "file-handling",
    "directory-management",
    "watching",
]
readme = "src/bindings/csharp/Dhara.Storage/README.md"
icon = "src/bindings/csharp/Dhara.Storage/assets/dhara-logo-colored_sm.png"
repository_url = "https://github.com/D-Naveenz/dhara_storage"
project_url = "https://github.com/D-Naveenz/dhara_storage"

[ci]
smoke_project = "src/bindings/csharp/Dhara.Storage.ConsumerSmoke/Dhara.Storage.ConsumerSmoke.csproj"
package_project = "src/bindings/csharp/Dhara.Storage/Dhara.Storage.csproj"
tests_project = "src/bindings/csharp/Dhara.Storage.Tests/Dhara.Storage.Tests.csproj"
native_runtimes = [
    "win-x64",
    "win-arm64",
    "linux-x64",
    "linux-arm64",
    "osx-arm64",
]
host_runtime_smoke = "win-x64"
aot_runtime_smoke = "win-x64"

[publish]
environment = "nuget-production"
api_key_env = "NUGET_API_KEY"

[targets.rust_targets]
linux-arm64 = "aarch64-unknown-linux-gnu"
linux-x64 = "x86_64-unknown-linux-gnu"
osx-arm64 = "aarch64-apple-darwin"
win-arm64 = "aarch64-pc-windows-msvc"
win-x64 = "x86_64-pc-windows-msvc"
